# Nginx 配置示例 — 复制到 /etc/nginx/sites-available/ecg-academy
# sudo ln -s /etc/nginx/sites-available/ecg-academy /etc/nginx/sites-enabled/
# sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name www.xindianxuetang.com xindianxuetang.com 47.84.49.31;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
}

# HTTPS（域名解析生效后）:
# sudo apt install certbot python3-certbot-nginx
# sudo certbot --nginx -d xindianxuetang.com -d www.xindianxuetang.com
